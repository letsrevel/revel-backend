name: Bandit Security Scan

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - src/**/*.py
      - pyproject.toml
      - uv.lock
      - .github/workflows/bandit.yaml
  pull_request:
    paths:
      - src/**/*.py
      - pyproject.toml
      - uv.lock
      - .github/workflows/bandit.yaml

jobs:
  bandit:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run Bandit
        run: uv run bandit -c pyproject.toml -r src/ -ll -ii
