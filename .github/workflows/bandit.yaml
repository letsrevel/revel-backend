name: Bandit Security Scan

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - src/**/*.py
      - pyproject.toml
      - .github/workflows/bandit.yaml
  pull_request:
    paths:
      - src/**/*.py
      - pyproject.toml
      - .github/workflows/bandit.yaml

jobs:
  bandit:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -c pyproject.toml -r src/ -ll -ii
