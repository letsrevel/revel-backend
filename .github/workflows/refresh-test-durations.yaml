name: Refresh test durations

# Weekly regeneration of `.test_durations` so pytest-split keeps balancing CI
# shards by runtime as the suite grows. Staleness degrades gracefully (tests
# missing from the file are distributed by count), so this is a hygiene sweep,
# not a correctness gate — failures just mean the refresh waits a week.
#
# The branch is pushed and the PR opened with the revel-release-bot App token,
# not GITHUB_TOKEN: events created by GITHUB_TOKEN don't fire `pull_request`
# workflows, so the required status checks would never run and the PR could
# not be merged. Checkout persists the App token so `git push` uses it too —
# otherwise weekly force-pushes to an already-open PR would not re-trigger CI.
# PR-branch commits are unsigned; main's required_signatures rule is satisfied
# by the squash commit GitHub signs at merge time.

on:
  schedule:
    # 04:47 UTC every Monday — off the top of the hour so we don't pile
    # onto the global GitHub Actions cron thundering herd at :00.
    - cron: "47 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    name: Regenerate .test_durations
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup backend environment
        uses: ./.github/actions/setup-backend
        with:
          compile-translations: "true"

      - name: Spin up docker
        run: docker compose -f docker-compose-ci.yml up -d

      # No coverage instrumentation: it slows the run and its overhead is
      # roughly uniform, so relative durations (all pytest-split cares about)
      # come out the same. --clean-durations drops entries for deleted tests.
      - name: Run test suite and store durations
        run: |
          uv run pytest \
            -n auto \
            --store-durations \
            --clean-durations \
            src

      - name: Teardown docker
        if: always()
        run: docker compose -f docker-compose-ci.yml down

      # Idempotent: force-pushes the same branch each week and only opens a PR
      # if none is already open for it. Skips entirely when the durations file
      # is unchanged (e.g. a manual refresh was merged the same week).
      - name: Open PR with refreshed durations
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- .test_durations; then
            echo "No changes to .test_durations; nothing to do."
            exit 0
          fi
          BRANCH=chore/refresh-test-durations
          git config user.name "revel-release-bot[bot]"
          git config user.email "297894374+revel-release-bot[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add .test_durations
          git commit -m "chore(ci): refresh .test_durations"
          git push --force origin "$BRANCH"
          if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq length)" = "0" ]; then
            gh pr create --head "$BRANCH" --base main \
              --title "chore(ci): weekly .test_durations refresh" \
              --body "$(printf 'Automated weekly regeneration of `.test_durations` so pytest-split keeps CI shards time-balanced as the suite evolves.\n\nGenerated by the `refresh-test-durations` workflow.')"
          else
            echo "PR already open for $BRANCH; branch updated."
          fi
