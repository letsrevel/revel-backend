name: Test

on:
  workflow_dispatch: {}
  # No path filter: all jobs in this workflow are required status checks on
  # main, and a path-filtered workflow that doesn't fire leaves its required
  # contexts stuck on "Expected — Waiting for status", blocking the PR.
  # (The old filter also had dead globs — `./**/*.yaml` never matches because
  # GitHub matches paths without the leading `./` — and blind spots: template,
  # locale, and fixture changes skipped the suite entirely.)
  push:
    branches: [main]
  pull_request: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: Lint, type & schema checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup backend environment
        uses: ./.github/actions/setup-backend

      - name: Check uv.lock
        run: |
          if ! git diff --exit-code uv.lock > /dev/null; then
            echo "❌ uv.lock is out of sync with pyproject.toml. Run 'uv sync' and commit the updated lockfile."
            git diff uv.lock
            exit 1
          fi

      - name: Restore mypy cache
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-
            mypy-${{ runner.os }}-

      - name: Run ruff formatting check
        run: uv run ruff format --check .

      - name: Run ruff linting check
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy --strict --extra-checks --warn-unreachable --warn-unused-ignores src

      - name: Check file length (max 1000 lines)
        run: ./scripts/check-file-length.sh 1000

      - name: Check Celery tasks declare explicit names
        run: uv run python scripts/check_task_names.py src

      - name: Check for missing migrations
        working-directory: src
        run: uv run manage.py makemigrations --check --dry-run --no-input

      - name: Check i18n catalog (keys extracted + translated)
        run: uv run python scripts/check_translations.py

  test:
    name: Tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - name: Setup backend environment
        uses: ./.github/actions/setup-backend
        with:
          compile-translations: "true"

      - name: Spin up docker
        run: docker compose -f docker-compose-ci.yml up -d

      # pytest-split balances shards by runtime using the committed
      # `.test_durations` file; refreshed weekly by refresh-test-durations.yaml
      # (or manually via `make store-durations`; staleness degrades gracefully —
      # tests missing from the file are distributed by count). Coverage data is dropped
      # without a report — the `coverage` job combines all shards and enforces
      # the 90% gate. `strategy.job-total` is the GH-provided matrix size, so
      # `--splits` always matches the number of runners.
      - name: Run unit tests (shard ${{ matrix.shard }})
        env:
          COVERAGE_FILE: .coverage.shard-${{ matrix.shard }}
        run: |
          uv run pytest \
            -n auto \
            --splits ${{ strategy.job-total }} \
            --group ${{ matrix.shard }} \
            --cov=src \
            --cov-report= \
            --cov-branch \
            src

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: .coverage.shard-${{ matrix.shard }}
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error

      - name: Teardown docker
        if: always()
        run: docker compose -f docker-compose-ci.yml down

  coverage:
    name: Combined coverage gate
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install a specific version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Download all coverage shards
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-shard-*
          merge-multiple: true

      - name: Combine coverage
        run: uv run coverage combine .coverage.shard-*

      - name: Report coverage (fail under 90%)
        run: uv run coverage report --fail-under=90

      - name: Generate XML for Codecov
        if: github.ref == 'refs/heads/main'
        run: uv run coverage xml

      - name: Upload coverage reports to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
