name: Test

on:
  workflow_dispatch: {}
  # No path filter: all jobs in this workflow are required status checks on
  # main, and a path-filtered workflow that doesn't fire leaves its required
  # contexts stuck on "Expected — Waiting for status", blocking the PR.
  # (The old filter also had dead globs — `./**/*.yaml` never matches because
  # GitHub matches paths without the leading `./` — and blind spots: template,
  # locale, and fixture changes skipped the suite entirely.)
  push:
    branches: [main]
  pull_request: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: Lint, type & schema checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install a specific version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check uv.lock
        run: |
          if ! git diff --exit-code uv.lock > /dev/null; then
            echo "❌ uv.lock is out of sync with pyproject.toml. Run 'uv sync' and commit the updated lockfile."
            git diff uv.lock
            exit 1
          fi

      # Cached .deb install: skips `apt update` on cache hit, which both saves
      # ~30-60s and removes exposure to flaky Ubuntu mirrors (a mirror stall
      # once cost a shard 5m34s). curl/gnupg/jq/unzip/software-properties-common
      # were dropped — they ship preinstalled on ubuntu-24.04 runners.
      - name: Install system deps
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: gdal-bin libgdal-dev gettext
          version: 1.0

      # GeoDjango locates gdal/geos via ctypes.util.find_library → the ldconfig
      # cache. A cache-hit restore drops the .so files in place without dpkg's
      # ldconfig trigger, so rebuild the cache explicitly.
      - name: Rebuild linker cache
        run: sudo ldconfig

      - name: Export GDAL path
        run: |
          echo "GDAL_LIBRARY_PATH=$(gdal-config --libs | grep -o '/[^ ]*libgdal[^ ]*\.so')" >> $GITHUB_ENV

      - name: Recreate environment file
        run: cp .env.example .env

      - name: Disable observability
        run: echo "FEATURE_OBSERVABILITY=False" >> .env

      - name: Add worldcities.csv  # required for migrations introspection
        working-directory: src
        run: cp geo/data/worldcities.mini.csv geo/data/worldcities.csv

      - name: Restore mypy cache
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-
            mypy-${{ runner.os }}-

      - name: Run ruff formatting check
        run: uv run ruff format --check .

      - name: Run ruff linting check
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy --strict --extra-checks --warn-unreachable --warn-unused-ignores src

      - name: Check file length (max 1000 lines)
        run: ./scripts/check-file-length.sh 1000

      - name: Check Celery tasks declare explicit names
        run: uv run python scripts/check_task_names.py src

      - name: Check for missing migrations
        working-directory: src
        run: uv run manage.py makemigrations --check --dry-run --no-input

      - name: Check i18n catalog (keys extracted + translated)
        run: uv run python scripts/check_translations.py

  test:
    name: Tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - name: Install a specific version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # See the notes on the checks job — cached to dodge apt mirror flakiness;
      # ldconfig rebuilt because a cache-hit restore skips dpkg's trigger.
      - name: Install system deps
        uses: awalsh128/cache-apt-pkgs-action@v1.6.3
        with:
          packages: gdal-bin libgdal-dev gettext
          version: 1.0

      - name: Rebuild linker cache
        run: sudo ldconfig

      - name: Export GDAL path
        run: |
          echo "GDAL_LIBRARY_PATH=$(gdal-config --libs | grep -o '/[^ ]*libgdal[^ ]*\.so')" >> $GITHUB_ENV

      - name: Recreate environment file
        run: cp .env.example .env

      - name: Disable observability for tests
        run: echo "FEATURE_OBSERVABILITY=False" >> .env

      - name: Add worldcities.csv  # we need this so migrations can run
        working-directory: src
        run: cp geo/data/worldcities.mini.csv geo/data/worldcities.csv

      - name: Compile translations  # .mo not committed (ADR-0011); i18n tests assert translated strings
        working-directory: src
        run: uv run python manage.py compilemessages

      - name: Spin up docker
        run: docker compose -f docker-compose-ci.yml up -d

      # pytest-split balances shards by runtime using the committed
      # `.test_durations` file; refresh it occasionally with
      # `make store-durations` (staleness degrades gracefully — tests missing
      # from the file are distributed by count). Coverage data is dropped
      # without a report — the `coverage` job combines all shards and enforces
      # the 90% gate. `strategy.job-total` is the GH-provided matrix size, so
      # `--splits` always matches the number of runners.
      - name: Run unit tests (shard ${{ matrix.shard }})
        env:
          COVERAGE_FILE: .coverage.shard-${{ matrix.shard }}
        run: |
          uv run pytest \
            -n auto \
            --splits ${{ strategy.job-total }} \
            --group ${{ matrix.shard }} \
            --cov=src \
            --cov-report= \
            --cov-branch \
            src

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: .coverage.shard-${{ matrix.shard }}
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error

      - name: Teardown docker
        if: always()
        run: docker compose -f docker-compose-ci.yml down

  coverage:
    name: Combined coverage gate
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install a specific version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Download all coverage shards
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-shard-*
          merge-multiple: true

      - name: Combine coverage
        run: uv run coverage combine .coverage.shard-*

      - name: Report coverage (fail under 90%)
        run: uv run coverage report --fail-under=90

      - name: Generate XML for Codecov
        if: github.ref == 'refs/heads/main'
        run: uv run coverage xml

      - name: Upload coverage reports to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
