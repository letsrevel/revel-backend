{%load i18n markdown_tags %}<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;}
        .container {max-width:600px;margin:0 auto;background:white;}
        .header {background:linear-gradient(135deg,#2196F3 0%,#2196F3dd 100%);color:white;padding:30px 20px;text-align:center;}
        .content {padding:30px 20px;}
        .card {background:#f8f9fa;border-left:4px solid #2196F3;padding:20px;margin:20px 0;border-radius:4px;}
        .card-body {margin:0;color:#555;line-height:1.6;}
        .card-body p {margin:0 0 10px 0;}
        .card-body p:last-child {margin-bottom:0;}
        .button {display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white!important;text-decoration:none;border-radius:6px;margin:20px 0;font-weight:600;}
        .footer {background:#f8f9fa;padding:20px;text-align:center;color:#666;font-size:14px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0;font-size:28px;">{{context.announcement_title}}</h1>
            <p style="margin:10px 0 0 0;opacity:0.9;">Revel</p>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-body">{{context.announcement_body|markdown}}</div>
            </div>
            {% if context.policy_url %}
            <center>
                <a href="{{context.policy_url}}" class="button">{%trans "Read More"%}</a>
            </center>
            {% endif %}
        </div>
        {%include "notifications/email/_footer.html"%}
    </div>
</body>
</html>
