<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 30px;
        }
        h1 {
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .organization-name {
            color: #3498db;
            font-weight: bold;
        }
        .meta {
            background-color: #ffffff;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .meta .label {
            color: #666;
            display: inline-block;
            min-width: 70px;
        }
        .message {
            background-color: #ffffff;
            border-radius: 6px;
            padding: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            margin: 20px 0 0;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>New contact message for <span class="organization-name">{{ organization_name }}</span></h1>

        <div class="meta">
            <div><span class="label">From:</span> {{ sender_email }}</div>
            {% if subject %}<div><span class="label">Subject:</span> {{ subject }}</div>{% endif %}
        </div>

        <div class="message">{{ message }}</div>

        <a href="{{ admin_link }}" class="btn">View in admin</a>

        <div class="footer">
            <p>Reply directly to this email to reach the sender. The Reply-To header is set to their address.</p>
            <p>Thank you,<br>The Revel Team</p>
        </div>
    </div>
</body>
</html>
